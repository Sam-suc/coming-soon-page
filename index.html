<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=arrow_forward_ios"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Base Apparel coming soon page</title>
  </head>

  <body>
    <main class="container">
      <!-- Top logo for mobile -->
      <header class="logo">
        <img src="images/logo.svg" alt="Base Apparel" />
      </header>

      <!-- Hero Image -->
      <div class="hero-image">
        <!-- Image will be 100% width via CSS -->
        <img src="images/hero-mobile.jpg" alt="Fashion model" />
      </div>

      <!-- Content Section -->
      <section class="content">
        <!-- Desktop logo often sits inside content section in split-screen -->
        <div class="desktop-logo">
          <img src="images/logo.svg" alt="Base Apparel" />
        </div>

        <h1><span>We're</span> Coming soon</h1>
        <p>
          Hello fellow shoppers! We’re currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our
          launch deals.
        </p>

        <form id="email-form" novalidate>
          <div class="input-group">
            <input
              id="email-input"
              type="email"
              placeholder="Email Address"
              required
            />
            <!-- Error icon (hidden by default) -->
            <img
              class="hidden"
              id="error-icon"
              src="images/icon-error.svg"
              alt=""
            />

            <button type="submit">
              <span class="material-symbols-outlined submit">
                arrow_forward_ios
              </span>
            </button>
          </div>

          <!-- Error Text (hidden by default) -->
          <p class="error-text hidden" id="error-message">
            Please provide a valid email
          </p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
